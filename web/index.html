<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>P-NATS-DB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>P-NATS DataBase</h1>
    <p>Purified Nucleic Acid Three-dimensional Structure DataBase</p>
  </header>

  <main>
    <div class="toolbar">
      <input id="searchBox" type="text" placeholder="Search by PDB ID">
      <button id="openFilterBtn" class="toolbar-btn" type="button">Filters</button>
    </div>
   

    <table id="entryTable">
      <thead>
        <tr>
          <th>PDB ID</th>
          <th>Links</th>
          <th>Method</th>
          <th id="sortRes" class="sortable">Resolution ⇅</th>
          <th>Assembly</th>
          <th>Nucleic acid type</th>
          <th>Sequence</th>
          <th>Purified structure</th>
          <th id="sortDate" class="sortable">Release Date ⇅</th>
        </tr>
      </thead>
      <tbody>
        </tbody>
    </table>
  </main>

  <div id="filterModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Filters</h2>
        <button id="closeFilterBtn" class="close-btn" type="button">&times;</button>
      </div>

      <div class="modal-body">
        <section>
          <h3>Experimental Method</h3>
          <div id="methodFilterContainer" class="filter-grid"></div>
        </section>

        <section>
          <h3>Nucleic Acid Type</h3>
          
          <h5>Single Strand (ss)</h5>
          <div class="filter-grid">
            <label><input type="checkbox" class="na-filter" value="ss DNA"> ss DNA</label>
            <label><input type="checkbox" class="na-filter" value="ss RNA"> ss RNA</label>
            <label><input type="checkbox" class="na-filter" value="ss Chimera"> ss Chimera</label>
            <label><input type="checkbox" class="na-filter" value="ss Other"> ss Other</label>
          </div>

          <h5>Double Strand (ds)</h5>
          <div class="filter-grid">
            <label><input type="checkbox" class="na-filter" value="ds DNA/DNA"> ds DNA/DNA</label>
            <label><input type="checkbox" class="na-filter" value="ds DNA/RNA"> ds DNA/RNA</label>
            <label><input type="checkbox" class="na-filter" value="ds DNA/Chimera"> ds DNA/Chimera</label>
            <label><input type="checkbox" class="na-filter" value="ds DNA/Other"> ds DNA/Other</label>     

            <label><input type="checkbox" class="na-filter" value="ds RNA/RNA"> ds RNA/RNA</label>
            <label><input type="checkbox" class="na-filter" value="ds RNA/Chimera"> ds RNA/Chimera</label>
            <label><input type="checkbox" class="na-filter" value="ds RNA/Other"> ds RNA/Other</label>
            
            <label><input type="checkbox" class="na-filter" value="ds Chimera/Chimera"> ds Chimera/Chimera</label>
            <label><input type="checkbox" class="na-filter" value="ds Chimera/Other"> ds Chimera/Other</label>

            <label><input type="checkbox" class="na-filter" value="ds Other/Other"> ds Other/Other</label>

          </div>

          <h5>More</h5>
          <div class="filter-grid">
            <label><input type="checkbox" class="na-filter" value="more than two strands"> more than two strands</label>
          </div>
        </section>
      </div>

      <div class="modal-footer">
        <button id="applyFilterBtn" class="toolbar-btn primary" type="button">Apply filters</button>
        <button id="clearFilterBtn" class="toolbar-btn" type="button">Clear all</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
