name: Scheduled Database Update

on:
  schedule:
    - cron: '0 0 * * 3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install general dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install requests

      - name: Setup X3DNA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/x3dna"

          gh release download v1.0 \
            --repo S-Ando-Biophysics/P-NATS-DB \
            --pattern 'x3dna-v2.4-linux-64bit.tar.gz'

          tar -xzf x3dna-v2.4-linux-64bit.tar.gz -C "$HOME/x3dna" --strip-components=1

          chmod -R u+rwx "$HOME/x3dna"
          echo "X3DNA=$HOME/x3dna" >> "$GITHUB_ENV"
          echo "$HOME/x3dna/bin" >> "$GITHUB_PATH"

          if [ -x "$HOME/x3dna/bin/x3dna_setup" ]; then
            "$HOME/x3dna/bin/x3dna_setup"
          fi

      - name: Setup P-NATS and its Virtual Environment
        run: |
          set -euo pipefail
          git clone https://github.com/S-Ando-Biophysics/P-NATS.git "$HOME/p-nats"
          cd "$HOME/p-nats/bin"

          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install gemmi

          chmod +x P-NATS.sh

          mkdir -p "$HOME/bin"
          ln -sf "$(pwd)/P-NATS.sh" "$HOME/bin/P-NATS"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Run Pipeline
        env:
          X3DNA: ${{ env.X3DNA }}
        run: |
          set -euo pipefail
          chmod +x scripts/run_all.sh
          ./scripts/run_all.sh

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/

          if ! git diff --cached --quiet -- data/; then
            git commit -m "Auto-update database: $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
